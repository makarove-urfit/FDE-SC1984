# Admin Staging Nginx 配置
# - SPA fallback (所有前端路由)
# - API 反向代理 → ai-go.app（避免 CORS）

server {
    listen 80;

    # API 反向代理：/api/v1/* → ai-go.app
    location /api/v1/ {
        proxy_pass https://ai-go.app/api/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host ai-go.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA 靜態資源 + fallback
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}
