# ============================================================
# 部署到 Staging
#
# Push 到 main 即自動部署 ordering + admin 兩個 Custom App
# 也可在 GitHub Actions 頁面手動觸發
# ============================================================

name: 部署到 Staging

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 部署到 Staging VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: deploy
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          REPO_NAME="fde-sc1984"
          APP_DIR="/opt/apps/${REPO_NAME}"

          # 首次部署：clone；後續：pull
          if [ ! -d "$APP_DIR" ]; then
            git clone https://github.com/AI-GO-APP/${REPO_NAME}.git "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard FETCH_HEAD

          # 確保 .env 檔案存在（首次部署時從 .env.example 複製）
          for f in ordering/.env ordering/backend/.env admin/.env; do
            if [ ! -f "$f" ]; then
              example="${f%.env}.env.example"
              if [ -f "$example" ]; then
                cp "$example" "$f"
                echo "已從 $example 建立 $f（請稍後填入正確值）"
              else
                touch "$f"
                echo "已建立空的 $f（請稍後填入正確值）"
              fi
            fi
          done

          # 建置並啟動 ordering + admin 雙服務
          docker-compose -f docker-compose.staging.yml up -d --build
